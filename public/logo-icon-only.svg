<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B8D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B8D4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield outline -->
  <path d="M50,5 L95,17 L95,55 C95,80 72,95 50,100 C28,95 5,80 5,55 L5,17 Z"
        fill="url(#shieldGrad)" opacity="0.15" stroke="url(#shieldGrad)" stroke-width="3"/>

  <!-- Bridge arch -->
  <path d="M22,62 Q50,25 78,62" fill="none" stroke="url(#accentGrad)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Bridge pillars -->
  <line x1="34" y1="47" x2="34" y2="67" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="32" x2="50" y2="67" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="66" y1="47" x2="66" y2="67" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Bridge road -->
  <line x1="18" y1="67" x2="82" y2="67" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Chain dots -->
  <circle cx="28" cy="78" r="3.5" fill="#00E5A0" opacity="0.7"/>
  <circle cx="50" cy="78" r="3.5" fill="#00D4B8" opacity="0.9"/>
  <circle cx="72" cy="78" r="3.5" fill="#00B8D4" opacity="0.7"/>
  <line x1="32" y1="78" x2="46" y2="78" stroke="#00D4B8" stroke-width="2" opacity="0.5"/>
  <line x1="54" y1="78" x2="68" y2="78" stroke="#00D4B8" stroke-width="2" opacity="0.5"/>
</svg>