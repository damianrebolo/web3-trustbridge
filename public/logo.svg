<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a5c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B8D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B8D4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield icon with bridge/chain motif -->
  <g transform="translate(15, 10)">
    <!-- Shield outline -->
    <path d="M45,5 L85,15 L85,55 C85,75 65,90 45,98 C25,90 5,75 5,55 L5,15 Z"
          fill="url(#shieldGrad)" opacity="0.15" stroke="url(#shieldGrad)" stroke-width="2.5"/>

    <!-- Bridge arch inside shield -->
    <path d="M20,58 Q45,28 70,58" fill="none" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>

    <!-- Bridge pillars -->
    <line x1="30" y1="45" x2="30" y2="62" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="45" y1="33" x2="45" y2="62" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="60" y1="45" x2="60" y2="62" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Bridge road -->
    <line x1="18" y1="62" x2="72" y2="62" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Chain links / connection dots -->
    <circle cx="25" cy="72" r="3" fill="#00E5A0" opacity="0.7"/>
    <circle cx="45" cy="72" r="3" fill="#00D4B8" opacity="0.85"/>
    <circle cx="65" cy="72" r="3" fill="#00B8D4" opacity="0.7"/>
    <line x1="28" y1="72" x2="42" y2="72" stroke="#00D4B8" stroke-width="1.5" opacity="0.5"/>
    <line x1="48" y1="72" x2="62" y2="72" stroke="#00D4B8" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Text -->
  <text x="110" y="55" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#0A1628" letter-spacing="-0.5">
    Trust<tspan fill="#00B8D4">Bridge</tspan>
  </text>

  <!-- Tagline -->
  <text x="112" y="78" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#5a6a7a" letter-spacing="2.5">
    VERIFIED TRUST. INSTANT ACCESS.
  </text>

  <!-- Powered by IOTA badge -->
  <g transform="translate(110, 88)">
    <rect x="0" y="0" width="105" height="20" rx="10" fill="#0A1628" opacity="0.08"/>
    <text x="52" y="14" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="500" fill="#5a6a7a" text-anchor="middle" letter-spacing="1">
      POWERED BY IOTA
    </text>
  </g>
</svg>